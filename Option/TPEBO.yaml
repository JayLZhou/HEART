################################# Working settings  #################################
# Basic Config
llm_model_max_token_size: 32768

index_name: tree_graph_balanced
force_rebuild: False
vdb_type: faiss  # vector/colbert
tuner_type: bo

# Chunk Config 
chunk:
  chunk_token_size: 1200
  chunk_overlap_token_size: 100
  token_model: gpt-3.5-turbo
  chunk_method: chunking_by_token_size



# Retrieval Config 
retriever:
  # TopK configuration for retrieval
  top_k:
    kmin: 2                    # Minimum number of items to retrieve
    kmax: 128                  # Maximum number of items to retrieve
    log: False                 # Whether to use logarithmic scale (True) or linear (False)
    step: 1                    # Step size for top_k values
  
  # Retrieval methods: dense (embedding-based), sparse (BM25), or hybrid
  methods:
    - dense
    - sparse
    - hybrid
  
  # Embedding models for dense retrieval
  embedding_models:
    - BAAI/bge-small-en-v1.5
    - BAAI/bge-large-en-v1.5
    - thenlper/gte-large
    - mixedbread-ai/mxbai-embed-large-v1
    - WhereIsAI/UAE-Large-V1
    - sentence-transformers/all-MiniLM-L12-v2
    - BAAI/bge-base-en-v1.5
  
  # Hybrid retrieval configuration (BM25 + Dense)
  hybrid:
    bm25_weight_min: 0.1       # Minimum weight for BM25 in hybrid retrieval
    bm25_weight_max: 0.9       # Maximum weight for BM25 in hybrid retrieval
    bm25_weight_step: 0.1      # Step size for BM25 weight
  
  # Query decomposition settings
  query_decomposition_enabled:
    - True

  
  query_decomposition:
    llm_names:
      - gpt-4o-mini
      - anthropic-haiku-35
      - gemini-flash
    num_queries_min: 2         # Minimum number of sub-queries to generate
    num_queries_max: 20        # Maximum number of sub-queries to generate
    num_queries_step: 2         # Step size for number of sub-queries
  
  # Fusion mode for combining results
  fusion:
    fusion_modes:
      - simple
      - reciprocal_rerank
      - relative_score
      - dist_based_score
    

query: 
    query_type: qa
    only_need_context: False
    enable_hybrid_query: True
    augmentation_ppr: True
    response_type: Multiple Paragraphs
    level: 2
    community_information: True
    retrieve_top_k: 20
    # naive search
    naive_max_token_for_text_unit: 12000
    # local search
    local_max_token_for_text_unit: 4000  # 12000 * 0.33
    max_token_for_text_unit: 4000
    use_keywords: True
    
    # Knob for RAPTOR
    tree_search: True

    entities_max_tokens: 2000
    relationships_max_tokens: 2000


    max_token_for_local_context: 4800  # 12000 * 0.4
    local_max_token_for_community_report: 3200  # 12000 * 0.27
    local_community_single_one: False
    # global search
    use_global_query: True
    global_min_community_rating:  0
    global_max_consider_community: 512
    global_max_token_for_community_report: 16384
    max_token_for_global_context: 4000
    global_special_community_map_llm_kwargs: {"response_format": {"type": "json_object"}}
    # For IR-COT
    max_ir_steps: 2
    
 
tuner:
  name: tpebo
  reuse_study: False
  recreate_study: False