# OpenAI 兼容接口：与上方 llms 相同硅基流动 Key / base_url（/v1/embeddings）
embedding:
  api_type: "openai"
  base_url: "http://localhost:8017/v1"
  api_key: "sk-local"
  model: "Qwen3-Embedding-0.6B"
  dimensions: 1024
  max_token_size: 8102
  embed_batch_size: 64
 
