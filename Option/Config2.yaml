working_dir: /data1/yujia/HEART/HEART/agent_workspace/runs # Result directory for the experiment
exp_name: tpebo # Experiment name
vdb_type: faiss
faiss_hnsw_m: 32
faiss_hnsw_ef_search: 64
faiss_hnsw_ef_construction: 40
faiss_metric: l2
